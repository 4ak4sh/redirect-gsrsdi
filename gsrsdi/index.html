<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Moved</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000; /* Clean, bold AMOLED dark mode */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #888888;
            margin: 0 0 30px 0;
        }
        .actions-wrapper {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 15px;
            border-radius: 6px;
            transition: opacity 0.2s ease;
            cursor: pointer;
            border: none;
            box-sizing: border-box;
        }
        .btn:hover {
            opacity: 0.9;
        }
        /* High-contrast border outline style for the copy button */
        .btn-secondary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
        }
        .btn-secondary:hover {
            background-color: #111111;
            border-color: #555555;
            opacity: 1;
        }
        .team-notice {
            border-top: 1px solid #1a1a1a;
            padding-top: 24px;
            text-align: left;
        }
        .team-notice h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555555;
            margin: 0 0 10px 0;
        }
        .team-notice ul {
            padding-left: 18px;
            margin: 0;
        }
        .team-notice li {
            font-size: 13px;
            line-height: 1.5;
            color: #888888;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>App URL updated</h1>
    <p>GSRS DI Validation Tool has permanently moved to 4ak4sh.github.io/gsrsdi.</p>
    
    <div class="actions-wrapper">
        <!-- Launches application cleanly in a new window/tab -->
        <a href="https://4ak4sh.github.io/gsrsdi" class="btn" target="_blank" rel="noopener noreferrer">Launch Application</a>
        
        <!-- Copy URL Button -->
        <button onclick="copyTargetUrl()" id="copyBtn" class="btn btn-secondary">Copy URL</button>
    </div>

    <div class="team-notice">
        <h2>⚠️ Notice for the Team</h2>
        <ul>
            <li><b>Please update your bookmarks to the new URL immediately!</b></li>
        </ul>
    </div>
</div>

<script>
function copyTargetUrl() {
    const targetUrl = "https://4ak4sh.github.io/gsrsdi";
    
    navigator.clipboard.writeText(targetUrl).then(() => {
        const copyBtn = document.getElementById("copyBtn");
        copyBtn.textContent = "Copied!";
        
        // Reset button state back to normal after 2 seconds
        setTimeout(() => {
            copyBtn.textContent = "Copy URL";
        }, 2000);
    }).catch(err => {
        console.error("Failed to copy URL: ", err);
    });
}
</script>

</body>
</html>
