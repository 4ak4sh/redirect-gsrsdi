<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Moved</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000; /* Clean, bold AMOLED dark mode */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #aaaaaa;
            margin: 0 0 35px 0;
        }
        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 16px 36px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 35px;
            transition: opacity 0.2s ease;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .team-notice {
            background-color: #0e0e0e;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 24px;
            text-align: left;
        }
        .team-notice h2 {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #ffffff;
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .team-notice ul {
            padding-left: 20px;
            margin: 0;
        }
        .team-notice li {
            font-size: 14px;
            line-height: 1.6;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        .team-notice li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>App URL Updated</h1>
    <p>GSRS DI Validation Tool has permanently moved to 4ak4sh.github.io/gsrsdi.</p>
    
    <!-- Launches application cleanly in a new window/tab -->
    <a href="https://4ak4sh.github.io/gsrsdi" class="btn" target="_blank" rel="noopener noreferrer">Launch Application</a>

    <div class="team-notice">
        <h2>⚠️ Notice for the Team</h2>
        <ul>
            <li>Please update your bookmarks to the new address immediately!</li>
        </ul>
    </div>
</div>

</body>
</html>
